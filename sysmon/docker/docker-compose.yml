version: "3.9"

services:
  # ── Zookeeper (required by Kafka) ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sysmon-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sysmon-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_JMX_PORT: 9101
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka topic init ────────────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sysmon-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:29092 \
        --topic sysmon.metrics \
        --partitions 6 \
        --replication-factor 1 \
        --config retention.ms=86400000 \
        --config compression.type=snappy && \
      echo 'Topic sysmon.metrics created'
      "

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sysmon-redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Go Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sysmon-backend
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: sysmon.metrics
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      LISTEN_ADDR: :8080
      GIN_MODE: release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── C++ Agent ──────────────────────────────────────────────────────────────
  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    container_name: sysmon-agent
    depends_on:
      kafka:
        condition: service_healthy
    privileged: true         # needed to read /proc of host processes
    pid: host                # share host PID namespace for accurate metrics
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: sysmon.metrics
      COLLECT_INTERVAL_MS: "1000"
      AGENT_THREADS: "4"
    restart: unless-stopped

  # ── Kafka UI (optional, dev convenience) ───────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sysmon-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    profiles:
      - dev

  # ── Redis Insight (optional, dev convenience) ──────────────────────────────
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: sysmon-redis-insight
    ports:
      - "8001:8001"
    profiles:
      - dev

volumes:
  zk-data:
  kafka-data:
  redis-data:

networks:
  default:
    name: sysmon-net
